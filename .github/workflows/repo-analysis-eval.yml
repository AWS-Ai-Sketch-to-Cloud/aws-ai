name: repo-analysis-eval

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/repo-analysis-eval.yml"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      BEDROCK_ENABLED: "false"
      BEDROCK_FALLBACK_ENABLED: "false"
      GITHUB_REPO_ANALYSIS_AI_ONLY: "false"
      GITHUB_TOKEN_ENCRYPTION_KEY: "ci-security-baseline-key-should-be-long-enough-123456"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run repo analysis evaluation gate
        run: |
          python scripts/preflight_check.py --skip-smoke --min-score 0.75
